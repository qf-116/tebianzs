<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>质量追溯 - 扫码查询</title>
<link rel="stylesheet" href="mobile-common.css">
<style>
/* 落地页品牌区 */
.landing-header{display:flex;flex-direction:column;align-items:center;padding:28px 24px 0}
.landing-header .scan-logo{width:56px;height:56px;border-radius:16px;background:linear-gradient(135deg,#1890ff,#36cfc9);display:flex;align-items:center;justify-content:center;margin-bottom:14px;box-shadow:0 4px 16px rgba(24,144,255,0.3)}
.landing-header .scan-logo svg{width:28px;height:28px;color:#fff}
.landing-header .scan-title{font-size:18px;font-weight:700;margin-bottom:6px;color:#1d2129}
.landing-header .scan-desc{font-size:13px;color:#86909c;margin-bottom:0}

/* 序列号输入区 */
.sn-input-section{padding:20px 16px 0}
.sn-row{display:flex;gap:8px;align-items:center}
.sn-row input{flex:1;height:44px;border:1px solid #e8e8e8;border-radius:8px;padding:0 14px;font-size:14px;outline:none;background:#fff;transition:border-color .2s}
.sn-row input:focus{border-color:#1890ff}
.sn-row input::placeholder{color:#c0c4cc}
.sn-scan-btn{width:44px;height:44px;border-radius:8px;background:#e6f7ff;color:#1890ff;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;border:none;transition:background .15s}
.sn-scan-btn:active{background:#bae7ff}
.sn-scan-btn svg{width:22px;height:22px}
.sn-query-btn{height:44px;padding:0 18px;background:#1890ff;color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:500;cursor:pointer;white-space:nowrap;flex-shrink:0;transition:background .15s}
.sn-query-btn:active{background:#096dd9}

/* 空状态 */
.landing-empty{text-align:center;padding:56px 24px 32px;color:#c0c0c0;font-size:14px}
.landing-empty .empty-icon{width:80px;height:80px;margin:0 auto 16px;background:#f5f6fa;border-radius:50%;display:flex;align-items:center;justify-content:center}
.landing-empty .empty-icon svg{width:40px;height:40px;color:#d9d9d9}
.landing-empty .empty-sub{font-size:12px;color:#d9d9d9;margin-top:6px}

/* 工单结果区 */
.wo-result-section{padding-top:8px}
.wo-list{padding:0 16px 16px}
.wo-card{background:#fff;border-radius:10px;border:1px solid #f0f0f0;margin-bottom:10px;overflow:hidden;cursor:pointer;transition:background .12s}
.wo-card:active{background:#fafafa}
.woc-header{padding:14px;display:flex;align-items:center;gap:10px}
.woc-icon{width:40px;height:40px;border-radius:10px;background:#e6f7ff;color:#1890ff;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.woc-icon svg{width:20px;height:20px}
.woc-info{flex:1;min-width:0}
.woc-no{font-size:14px;font-weight:600;color:#1d2129;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.woc-product{font-size:12px;color:#86909c;margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.woc-arrow{color:#d9d9d9;font-size:14px;flex-shrink:0}
.woc-meta{display:grid;grid-template-columns:1fr 1fr;gap:4px 12px;padding:0 14px 10px}
.woc-meta .wm-label{font-size:11px;color:#86909c}
.woc-meta .wm-val{font-size:12px;color:#1d2129;font-weight:500}
.woc-footer{display:flex;align-items:center;justify-content:space-between;padding:0 14px 14px}
.woc-tag{padding:3px 8px;border-radius:4px;font-size:11px;font-weight:600}
.woc-tag.completed{background:#f6ffed;color:#52c41a;border:1px solid #b7eb8f}
.woc-tag.inprogress{background:#e6f7ff;color:#1890ff;border:1px solid #91d5ff}
.woc-tag.pending{background:#f5f5f5;color:#999;border:1px solid #e8e8e8}
.woc-enter{font-size:12px;color:#1890ff;font-weight:500;display:flex;align-items:center;gap:2px}

/* 加载状态 */
.wo-loading{text-align:center;padding:40px 16px;color:#86909c;font-size:13px}
.wo-loading .spinner{width:24px;height:24px;border:2px solid #e8e8e8;border-top-color:#1890ff;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 10px}
@keyframes spin{to{transform:rotate(360deg)}}

/* 无结果状态 */
.wo-noresult{text-align:center;padding:32px 16px}
.wo-noresult .noresult-icon{width:56px;height:56px;margin:0 auto 12px;background:#fff1f0;border-radius:50%;display:flex;align-items:center;justify-content:center}
.wo-noresult .noresult-icon svg{width:28px;height:28px;color:#ff4d4f}
.wo-noresult p{font-size:13px;color:#86909c;line-height:1.6}
.wo-noresult b{color:#1d2129}

/* 扫码遮罩层 */
.scan-overlay{position:fixed;top:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;height:100%;background:rgba(0,0,0,0.85);z-index:200;display:flex;flex-direction:column;align-items:center}
.scan-overlay-header{width:100%;padding:50px 16px 16px;display:flex;align-items:center}
.scan-overlay-close{width:32px;height:32px;color:#fff;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,0.1);border-radius:50%;border:none}
.scan-overlay-title{flex:1;text-align:center;font-size:16px;font-weight:600;color:#fff;margin-right:32px}
.scan-overlay .scan-frame{margin-top:40px}
.scan-overlay .scan-tips{color:rgba(255,255,255,0.7);margin-top:24px}
.scan-overlay .scan-actions{margin-top:40px}
.scan-overlay .scan-btn .sb-icon{background:rgba(255,255,255,0.15);border-color:rgba(255,255,255,0.3)}
.scan-overlay .scan-btn .sb-icon svg{color:#fff}
.scan-overlay .scan-btn .sb-text{color:rgba(255,255,255,0.7)}
</style>
</head>
<body>
<div class="phone-frame">
  <div class="status-bar"><span class="time">9:41</span><span>📶 🔋</span></div>
  <div class="nav-bar">
    <div class="back" style="visibility:hidden"></div>
    <div class="title">质量追溯</div>
    <div class="action"></div>
  </div>

  <!-- 品牌区 -->
  <div class="landing-header">
    <div class="scan-logo">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 7V5a2 2 0 012-2h2"/><path d="M17 3h2a2 2 0 012 2v2"/><path d="M21 17v2a2 2 0 01-2 2h-2"/><path d="M7 21H5a2 2 0 01-2-2v-2"/><line x1="7" y1="12" x2="17" y2="12"/>
      </svg>
    </div>
    <div class="scan-title">质量追溯查询</div>
    <div class="scan-desc">输入序列号或扫描二维码查询工单信息</div>
  </div>

  <!-- 序列号输入区 -->
  <div class="sn-input-section">
    <div class="sn-row">
      <input type="text" id="snInput" value="SN2026050800001" placeholder="请输入物料序列号" onkeydown="if(event.key==='Enter')querySN()">
      <button class="sn-scan-btn" onclick="openScanner()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 7V5a2 2 0 012-2h2"/><path d="M17 3h2a2 2 0 012 2v2"/><path d="M21 17v2a2 2 0 01-2 2h-2"/><path d="M7 21H5a2 2 0 01-2-2v-2"/>
        </svg>
      </button>
      <button class="sn-query-btn" onclick="querySN()">查询</button>
    </div>
  </div>

  <!-- 空状态（初始显示） -->
  <div id="emptyState" class="landing-empty">
    <div class="empty-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
    </div>
    <p>请输入物料序列号或扫描二维码</p>
    <p class="empty-sub">查询关联的生产工单信息</p>
  </div>

  <!-- 工单结果区（查询后显示） -->
  <div id="resultSection" class="wo-result-section" style="display:none">
    <div class="section-title">
      关联工单 <span class="st-more" id="woCount"></span>
    </div>
    <div id="woList" class="wo-list"></div>
  </div>

  <!-- 扫码遮罩层 -->
  <div id="scanOverlay" class="scan-overlay" style="display:none">
    <div class="scan-overlay-header">
      <button class="scan-overlay-close" onclick="closeScanner()">✕</button>
      <div class="scan-overlay-title">扫描二维码</div>
    </div>
    <div class="scan-frame">
      <div class="corner tl"></div>
      <div class="corner tr"></div>
      <div class="corner bl"></div>
      <div class="corner br"></div>
      <div class="scan-line"></div>
    </div>
    <div class="scan-tips">将二维码放入框内，即可自动扫描</div>
    <div class="scan-actions">
      <div class="scan-btn" onclick="mockScan()">
        <div class="sb-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="24" height="24" stroke-linecap="round" stroke-linejoin="round">
            <path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z"/><circle cx="12" cy="13" r="4"/>
          </svg>
        </div>
        <span class="sb-text">模拟扫码</span>
      </div>
    </div>
  </div>

  <div class="bottom-safe"></div>
</div>

<script>
// === 模拟数据 ===
var MOCK_DATA = {
  'SN2026050800001': [
    {
      woNo: 'SCGD202605080001',
      product: '变频器SB200-11T4T',
      materialCode: 'KJ040102-000061',
      status: 'completed',
      statusText: '已完工',
      quantity: 40,
      completedQty: 40,
      qualifiedQty: 38,
      planDate: '2026-05-08',
      completeDate: '2026-05-10'
    },
    {
      woNo: 'SCGD202605080002',
      product: '变频器SB200-15T4T',
      materialCode: 'KJ040102-000062',
      status: 'inprogress',
      statusText: '生产中',
      quantity: 20,
      completedQty: 12,
      qualifiedQty: 12,
      planDate: '2026-05-09',
      completeDate: ''
    }
  ],
  'SN2026050900001': [
    {
      woNo: 'SCGD202605090001',
      product: '变频调速用干式整流变压器',
      materialCode: 'CT03001-000311',
      status: 'pending',
      statusText: '待生产',
      quantity: 1,
      completedQty: 0,
      qualifiedQty: 0,
      planDate: '2026-05-17',
      completeDate: ''
    }
  ]
};

// === 查询序列号 ===
function querySN() {
  var sn = document.getElementById('snInput').value.trim();
  if (!sn) {
    showToast('请输入物料序列号');
    return;
  }

  // 隐藏空状态，显示结果区
  document.getElementById('emptyState').style.display = 'none';
  var resultSection = document.getElementById('resultSection');
  resultSection.style.display = 'block';
  document.getElementById('woList').innerHTML =
    '<div class="wo-loading"><div class="spinner"></div>查询中...</div>';

  // 模拟网络延迟
  setTimeout(function() {
    var orders = MOCK_DATA[sn];
    if (!orders) {
      document.getElementById('woList').innerHTML =
        '<div class="wo-noresult">' +
          '<div class="noresult-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg></div>' +
          '<p>未找到序列号 <b>' + sn + '</b> 关联的工单</p>' +
        '</div>';
      document.getElementById('woCount').textContent = '0条记录';
      return;
    }
    renderWOList(orders);
  }, 600);
}

// === 渲染工单列表 ===
function renderWOList(orders) {
  document.getElementById('woCount').textContent = '共' + orders.length + '条';
  var html = '';
  orders.forEach(function(wo) {
    html +=
      '<div class="wo-card" onclick="goToDetail(\'' + wo.woNo + '\')">' +
        '<div class="woc-header">' +
          '<div class="woc-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.7 6.3a1 1 0 000 1.4l1.6 1.6a1 1 0 001.4 0l3.77-3.77a6 6 0 01-7.94 7.94l-6.91 6.91a2.12 2.12 0 01-3-3l6.91-6.91a6 6 0 017.94-7.94l-3.76 3.76z"/></svg></div>' +
          '<div class="woc-info">' +
            '<div class="woc-no">' + wo.woNo + '</div>' +
            '<div class="woc-product">' + wo.product + '</div>' +
          '</div>' +
          '<span class="woc-arrow">&#8250;</span>' +
        '</div>' +
        '<div class="woc-meta">' +
          '<div><span class="wm-label">需求数量</span><br><span class="wm-val">' + wo.quantity + '台</span></div>' +
          '<div><span class="wm-label">完工数量</span><br><span class="wm-val">' + wo.completedQty + '台</span></div>' +
          '<div><span class="wm-label">合格数量</span><br><span class="wm-val" style="color:#52c41a">' + wo.qualifiedQty + '台</span></div>' +
          '<div><span class="wm-label">计划日期</span><br><span class="wm-val">' + wo.planDate + '</span></div>' +
        '</div>' +
        '<div class="woc-footer">' +
          '<span class="woc-tag ' + wo.status + '">' + wo.statusText + '</span>' +
          '<span class="woc-enter">查看详情 &#8250;</span>' +
        '</div>' +
      '</div>';
  });
  document.getElementById('woList').innerHTML = html;
}

// === 跳转工单详情 ===
function goToDetail(woNo) {
  location.href = 'mobile-overview.html?wo=' + encodeURIComponent(woNo);
}

// === 扫码遮罩层 ===
function openScanner() {
  document.getElementById('scanOverlay').style.display = 'flex';
}

function closeScanner() {
  document.getElementById('scanOverlay').style.display = 'none';
}

function mockScan() {
  closeScanner();
  document.getElementById('snInput').value = 'SN2026050800001';
  querySN();
}

// === 轻提示 ===
function showToast(msg) {
  var existing = document.querySelector('.toast-msg');
  if (existing) existing.remove();

  var toast = document.createElement('div');
  toast.className = 'toast-msg';
  toast.textContent = msg;
  toast.style.cssText = 'position:fixed;top:100px;left:50%;transform:translateX(-50%);' +
    'background:rgba(0,0,0,0.75);color:#fff;padding:8px 20px;border-radius:20px;' +
    'font-size:13px;z-index:300;white-space:nowrap;animation:fadeIn .2s ease';
  document.body.appendChild(toast);

  setTimeout(function() {
    toast.style.opacity = '0';
    toast.style.transition = 'opacity .3s';
    setTimeout(function() { toast.remove(); }, 300);
  }, 2000);
}
</script>
</body>
</html>
